name: Build Tabby plugin

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build installable artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: node node_modules/typescript/bin/tsc --noEmit

      - name: Smoke test
        run: npm run test:smoke

      - name: Pack plugin
        run: npm run pack:plugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabby-status-plugin
          path: release/*.zip
          if-no-files-found: error

      - name: Publish latest GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          zip_path="$(find release -maxdepth 1 -type f -name '*.zip' -print -quit)"
          test -n "${zip_path}"
          version="$(node -p "require('./package.json').version")"
          release_tag="latest"
          release_title="tabby-status latest"

          cat > release-notes.md <<EOF
          Automated latest build from main.

          - Version: ${version}
          - Commit: ${GITHUB_SHA}
          - Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${release_tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${release_tag}" --force

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release edit "${release_tag}" --title "${release_title}" --notes-file release-notes.md --latest --target "${GITHUB_SHA}"
            gh release upload "${release_tag}" "${zip_path}" --clobber
          else
            gh release create "${release_tag}" "${zip_path}" --title "${release_title}" --notes-file release-notes.md --latest --target "${GITHUB_SHA}"
          fi

      - name: Publish version GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
